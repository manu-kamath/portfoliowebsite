      let grid = [], cols = 0, rows = 0; const fontSize = 4;
      let pixelData = null;
      
      function getRandomChar() { return config.characterSet.chars[Math.floor(Math.random() * config.characterSet.chars.length)]; }

      function initializeGrid() {
          const dpr = window.devicePixelRatio || 1; const rect = canvas.getBoundingClientRect();
          canvas.width = rect.width * dpr; canvas.height = rect.height * dpr; ctx.scale(dpr, dpr);
          cols = Math.floor(rect.width / fontSize); rows = Math.floor(rect.height / fontSize);
          grid = Array.from({ length: rows }, () => Array.from({ length: cols }, () => getRandomChar()));
          
          if(img.complete) processImage();
      }

      function processImage() {
          const tempCanvas = document.createElement('canvas'); tempCanvas.width = cols; tempCanvas.height = rows;
          const tCtx = tempCanvas.getContext('2d');
          const imgRatio = img.width / img.height; const canvasRatio = cols / rows;
          let dw = cols, dh = rows, dx = 0, dy = 0;
          if (imgRatio > canvasRatio) { dh = rows; dw = rows * imgRatio; dx = (cols - dw) / 2; dy = 0; }
          else { dw = cols; dh = cols / imgRatio; dy = (rows - dh) / 2; dx = 0; }
          tCtx.clearRect(0,0,cols,rows); tCtx.drawImage(img, dx, dy, dw, dh);
          pixelData = tCtx.getImageData(0,0,cols,rows).data;
      }

      function draw() {
          const rect = canvas.getBoundingClientRect();
          if (config.transparentBg) { ctx.clearRect(0, 0, rect.width, rect.height); } 
          else { ctx.fillStyle = config.backgroundColor; ctx.fillRect(0, 0, rect.width, rect.height); }
          ctx.font = `${fontSize}px monospace`; ctx.globalAlpha = config.shapeOpacity;
          
          if (pixelData) {
              for (let i = 0; i < rows; i++) { for (let j = 0; j < cols; j++) {
                  const idx = (i * cols + j) * 4; const a = pixelData[idx+3];
                  if (a === 0) continue;
                  const r = pixelData[idx], g = pixelData[idx+1], b = pixelData[idx+2];
                  ctx.fillStyle = `rgb(${r},${g},${b})`; ctx.fillText(grid[i][j], j * fontSize, i * fontSize);
              }}
          }
          ctx.globalAlpha = 1.0;
          for(let i=0; i<rows; i++) for(let j=0; j<cols; j++) {
             if (Math.random() < config.animationSpeed / 1000) grid[i][j] = getRandomChar();
          }
          requestAnimationFrame(draw);
      }
      window.addEventListener('resize', () => { initializeGrid(); processImage(); });
      img.onload = () => { initializeGrid(); draw(); };
